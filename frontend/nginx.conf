server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unknown paths route to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to backend service
    # proxy_buffering off is critical for SSE streams
    location /api/ {
        proxy_pass         http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection '';        # needed for SSE (no Connection: upgrade)
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering    off;                  # critical for SSE — do not buffer chunks
        proxy_cache        off;
        chunked_transfer_encoding on;
    }
}
