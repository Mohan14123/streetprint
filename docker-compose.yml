# ────────────────────────────────────────────────────────────────
# Route Memory Platform — Docker Compose
#
# Services: api, mongo, redis
# Health checks ensure api only starts after mongo + redis are healthy.
# All secrets and env vars are loaded from .env via env_file.
# ────────────────────────────────────────────────────────────────

services:
  # ── MongoDB ─────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: route-memory-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: route-memory-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── API ─────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: route-memory-api
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - CLIENT_URL=${CLIENT_URL}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: route-memory-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    environment:
      # Empty in prod — nginx proxy handles /api/* → backend service
      - VITE_API_URL=
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
