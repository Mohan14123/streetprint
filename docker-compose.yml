# ────────────────────────────────────────────────────────────────
# Route Memory Platform — Docker Compose
#
# Services: api, mongo, redis
# Health checks ensure api only starts after mongo + redis are healthy.
# All secrets and env vars are loaded from .env via env_file.
# ────────────────────────────────────────────────────────────────

services:
  # ── MongoDB ─────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: route-memory-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: route-memory-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── API ─────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: route-memory-api
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://route-memory-mongo:27017/route_memory
      - REDIS_URL=redis://route-memory-redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: route-memory-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    environment:
      # Empty in prod — nginx proxy handles /api/* → backend service
      - VITE_API_URL=
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: route-memory-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: route-memory-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
